# PM & Tech Radar — Source Configuration
# Edit this file to add/remove tracked sources

# RSS and Atom blog feeds
feeds:
  - id: lenny
    name: "Lenny's Newsletter"
    url: "https://www.lennysnewsletter.com/feed"
    category: product-management

  - id: svpg
    name: "SVPG (Silicon Valley Product Group)"
    url: "https://www.svpg.com/feed/"
    category: product-management

  - id: anthropic
    name: "Anthropic Blog"
    url: "https://www.anthropic.com/sitemap.xml"
    type: sitemap
    prefixes:
      - /research
      - /news
      - /engineering
    category: ai-agents

  - id: aws-architecture
    name: "AWS Architecture Blog"
    url: "https://aws.amazon.com/blogs/architecture/feed/"
    category: architecture

  - id: martin-fowler
    name: "Martin Fowler"
    url: "https://martinfowler.com/feed.atom"
    category: architecture

  - id: infoq-architecture
    name: "InfoQ Architecture"
    url: "https://feed.infoq.com/architecture-design/"
    category: architecture

# GitHub repositories to track (issues, PRs, releases)
github_repos:
  - id: tinytroupe
    repo: "microsoft/tinytroupe"
    name: "TinyTroupe"
    category: ai-agents

  - id: langgraph
    repo: "langchain-ai/langgraph"
    name: "LangGraph"
    category: ai-agents

  - id: claude-code
    repo: "anthropics/claude-code"
    name: "Claude Code"
    category: ai-agents

  - id: adr
    repo: "joelparkerhenderson/architecture-decision-record"
    name: "Architecture Decision Records"
    category: architecture

# Hacker News filter keywords
hn_keywords:
  - "product management"
  - "technical architecture"
  - "system design"
  - "AI agent"
  - "program management"
  - "tech lead"
  - "ADR"
  - "synthetic data"
  - "context engineering"
  - "staff engineer"

# Report categories
categories:
  - id: product-management
    name: "Product & Program Management"
    report_file: "pm-digest"

  - id: architecture
    name: "Architecture & Technical Scoping"
    report_file: "architecture-digest"

  - id: ai-agents
    name: "AI & Agent Ecosystem"
    report_file: "ai-agents-digest"

  - id: forum
    name: "Community & Forum Highlights"
    report_file: "forum-digest"
